<div class="auth-shell starfield scanlines">
  <div class="auth-shell__inner">

    <section class="auth-screen" id="forgot-password" aria-labelledby="forgot-title">
      <div class="pixel-card pixel-card--gold pixel-card--corners">
        <span class="corner-bl"></span>
        <span class="corner-br"></span>

        <header class="auth__header">
          <div class="auth__big-icon" aria-hidden="true" style="margin-bottom: 8px;">🔓</div>
          <h1 class="auth__title font-pixel" id="forgot-title">► FORGOT PASSWORD?</h1>
          <p class="auth__subtitle font-rpg">ENTER YOUR EMAIL TO RECEIVE A RESET LINK</p>
        </header>

        <form class="auth__form" [formRoot]="forgotPasswordForm">
          <app-form-banner [state]="banner" />

          <app-field label="EMAIL ADDRESS">
            <input
              class="pixel-input"
              id="forgot-email"
              type="email"
              placeholder="player@guild.io"
              autocomplete="email"
              [formField]="forgotPasswordForm.email"
              [formFieldDir]="forgotPasswordForm.email"
            />
          </app-field>

          <button class="pixel-btn pixel-btn--gold auth__submit font-pixel" type="submit"  [disabled]="forgotPasswordForm().submitting()">
            @if(forgotPasswordForm().submitting()){
            SENDING RESET LINK
            }
            @else{
            SEND RESET LINK
            }
            
          </button>

          <div class="auth__link-row auth__link-row--center">
            <a routerLink="/login" class="auth__link font-pixel">◄ BACK TO LOGIN</a>
          </div>
        </form>

      </div>
    </section>

  </div>
</div>
