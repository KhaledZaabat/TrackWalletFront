<section class="auth-screen" aria-labelledby="reset-sent-title">
  <div class="pixel-card pixel-card--gold pixel-card--corners">
    <span class="corner-bl"></span>
    <span class="corner-br"></span>
    <div class="auth__centered">

      <span class="auth__big-icon pulse-glow" aria-hidden="true">✉</span>

      <h1 class="auth__title font-pixel" id="reset-sent-title">
        PASSWORD RESET DISPATCHED!
      </h1>

      <p class="auth__subtitle font-rpg">A RESET LINK HAS BEEN SENT TO:</p>

      <div class="auth__email-display font-pixel" role="status" aria-live="polite">
        {{ email() }}
      </div>

      <button
        class="pixel-btn pixel-btn--ghost auth__submit font-pixel"
        type="button"
        [disabled]="resendCooldown() > 0 || resending()"
        (click)="resend()"
        aria-live="polite"
      >
        @if (resendCooldown() > 0) {
          ⟳ RESEND IN {{ resendCooldown() }}s
        } @else {
          RESEND LINK
        }
      </button>

      <div class="auth__link-row auth__link-row--center">
        <a routerLink="/login" class="auth__link font-pixel">◄ BACK TO LOGIN</a>
      </div>

    </div>
  </div>
</section>
