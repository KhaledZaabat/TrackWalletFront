<div class="auth-shell starfield scanlines">
  <div class="auth-shell__inner">
    <section class="auth-screen" aria-labelledby="reset-password-title">
      <div class="pixel-card pixel-card--gold pixel-card--corners">
        <span class="corner-bl"></span>
        <span class="corner-br"></span>

        <header class="auth__header">
          <h1 class="auth__title font-pixel" id="reset-password-title">► RESET PASSWORD</h1>
          <p class="auth__subtitle font-rpg">FORGE A NEW SECRET</p>
        </header>

        <form class="auth__form" [formRoot]="resetForm">
          <app-form-banner [state]="banner" />

          <div class="auth__section">
      
            <app-password [fields]="resetForm.passwordForm" />
          </div>

          <button
            class="pixel-btn pixel-btn--gold auth__submit font-pixel"
            type="submit"
            [disabled]="resetForm().submitting()"
          >
            {{ resetForm().submitting() ? '► SAVING...' : '► SAVE NEW PASSWORD' }}
          </button>

          <div class="auth__link-row auth__link-row--center">
            <a routerLink="/login" class="auth__link font-pixel">◄ BACK TO LOGIN</a>
          </div>
        </form>
      </div>
    </section>
  </div>
</div>
