<!-- PASSWORD -->
<app-field label="PASSWORD" [disableErrors]="true">
  <div class="auth__password-wrap">
    <input
      class="pixel-input auth__password-input"
      id="new-password"
      [type]="showNew() ? 'text' : 'password'"
      placeholder="••••••••"
      autocomplete="new-password"
      [formField]="fields().password"
      [formFieldDir]="fields().password"
    />
    <button
      class="auth__show-btn"
      type="button"
      [attr.aria-label]="showNew() ? 'Hide password' : 'Show password'"
      [attr.aria-pressed]="showNew()"
      (click)="showNew.set(!showNew())"
    >
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" aria-hidden="true">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
      <span class="font-pixel">{{ showNew() ? 'HIDE' : 'SHOW' }}</span>
    </button>
  </div>

  <!-- Strength bar (sits visually attached to the password input) -->
  <div class="auth__strength" aria-label="Password strength">
    <div class="auth__strength-bars">
      @for (bar of [1, 2, 3, 4, 5]; track bar) {
        <div
          class="auth__strength-bar"
          [class.auth__strength-bar--filled]="strengthLevel() >= bar"
          [class.auth__strength-bar--weak]="strengthLevel() >= bar && strengthBand() === 'weak'"
          [class.auth__strength-bar--fair]="strengthLevel() >= bar && strengthBand() === 'fair'"
          [class.auth__strength-bar--good]="strengthLevel() >= bar && strengthBand() === 'good'"
          [class.auth__strength-bar--strong]="strengthLevel() >= bar && strengthBand() === 'strong'"
        ></div>
      }
    </div>
  </div>
</app-field>

<!-- CONFIRM PASSWORD -->
<app-field label="CONFIRM PASSWORD">
  <div class="auth__password-wrap">
    <input
      class="pixel-input auth__password-input"
      id="confirm-new-password"
      [type]="showConfirm() ? 'text' : 'password'"
      placeholder="••••••••"
      autocomplete="new-password"
      [formField]="fields().confirmPassword"
      [formFieldDir]="fields().confirmPassword"
    />
    <button
      class="auth__show-btn"
      type="button"
      [attr.aria-label]="showConfirm() ? 'Hide password' : 'Show password'"
      [attr.aria-pressed]="showConfirm()"
      (click)="showConfirm.set(!showConfirm())"
    >
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" aria-hidden="true">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
      <span class="font-pixel">{{ showConfirm() ? 'HIDE' : 'SHOW' }}</span>
    </button>
  </div>
</app-field>

<!-- Requirements checklist — compact, attached to the password block -->
<div class="auth__requirements" role="list" aria-label="Password requirements">
  @for (req of reqsMet(); track req.kind) {
    <div
      class="auth__req font-pixel"
      role="listitem"
      [class.auth__req--ok]="req.met"
    >
      <span
        class="auth__req-check"
        [class.auth__req-check--ok]="req.met"
        aria-hidden="true"
      >✓</span>
      <span>{{ req.label }}</span>
    </div>
  }
</div>
