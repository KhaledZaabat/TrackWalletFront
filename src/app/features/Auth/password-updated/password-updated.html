<div class="auth-shell starfield scanlines">
  <div class="auth-shell__inner">
    <section class="auth-screen" aria-labelledby="updated-title">
      <div class="pixel-card pixel-card--gold pixel-card--corners">
        <span class="corner-bl"></span>
        <span class="corner-br"></span>

        <div class="auth__centered">
          <div class="success-icon-wrap" aria-hidden="true">
            🔑
          </div>

          <h1 class="auth__title font-pixel glitch-text" id="updated-title">
            ► ACCESS GRANTED
          </h1>

          <p class="auth__subtitle font-rpg" style="color: var(--color-green);">
            PASSWORD UPDATED SUCCESSFULLY!
          </p>

          <div class="auth__body font-rpg" style="margin: 8px 0; font-size: 20px; line-height: 1.4; color: var(--color-text-muted);">
            Your secret key has been reforged. The vault is secure and ready for your arrival.
          </div>

          <div class="xp-reward font-pixel">
            🏆 QUEST COMPLETE: KEY REFORGED (+50 XP)
          </div>

          <a
            routerLink="/login"
            class="pixel-btn pixel-btn--gold auth__submit font-pixel"
            style="width: 100%; text-decoration: none; text-align: center; margin-top: 16px;"
          >
            ► ENTER TAVERN (LOGIN)
          </a>
        </div>
      </div>
    </section>
  </div>
</div>
