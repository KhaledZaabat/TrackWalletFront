 <svg class="splash__char" width="48" height="56" 
         viewBox="0 0 48 56" 
         style="image-rendering:pixelated;"
         [attr.aria-label]="label()">

      <!-- Head -->
      <rect x="16" y="2"  width="16" height="14" [attr.fill]="headColor()"/>
      <rect x="18" y="6"  width="4"  height="4"  fill="#0A0A14"/>
      <rect x="26" y="6"  width="4"  height="4"  fill="#0A0A14"/>
      <rect x="20" y="12" width="8"  height="2"  fill="#0A0A14"/>

      <!-- Body -->
      <rect x="12" y="16" width="24" height="18" [attr.fill]="bodyColor()"/>
      <rect x="6"  y="18" width="6"  height="8"  [attr.fill]="bodyColor()"/>
      <rect x="36" y="18" width="6"  height="8"  [attr.fill]="bodyColor()"/>

      <!-- Legs -->
      <rect x="14" y="34" width="8"  height="14" fill="#4A90D9"/>
      <rect x="26" y="34" width="8"  height="14" fill="#4A90D9"/>
      <rect x="12" y="46" width="10" height="6"  fill="#6272A4"/>
      <rect x="26" y="46" width="10" height="6"  fill="#6272A4"/>
    </svg>
